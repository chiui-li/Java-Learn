<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - chiuili</title>
    <meta name="description" content="浏览所有博客，发现精彩内容, 个人blog, 编程技术，计算机编程，生活记录">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <script>
      // window.onload = function() {
      //   location.href = "/blog/chiuili/index.html";
      // };
    </script>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-inner">
        <a class="logo" href="/">首页</a>
    </div>
</header>

<!-- Main Content -->
<div class="main-content">
    <div class="home-container">

        <h1 class="home-title"></h1>
        <!-- <p class="home-subtitle">欢迎浏览以下我的站点</p> -->
        <p class="site-category">博客</p>
        <div class="user-grid" th:if="${users != null and !users.isEmpty()}">
            <a class="user-card"
               th:each="user : ${users}"
               th:href="@{//blog.chiuili.top/blog/{userName}(userName=${user.username})}"
               th:title="'访问 ' + ${user.username} + ' 的博客'">
                <div class="user-avatar" th:if="${user.avatar != null}">
                    <img th:src="${user.avatar}" alt="">
                </div>
                <div class="user-avatar user-avatar-empty" th:unless="${user.avatar != null}">
                    <span th:text="${#strings.substring(user.username, 0, 1)}">U</span>
                </div>
                <div class="user-info">
                    <h2 class="user-name" th:text="${user.username}">用户名</h2>
                    <p class="user-bio" th:if="${user.bio != null}" th:text="${user.bio}">个人简介</p>
                </div>
            </a>
        </div>

        <div class="empty" th:if="${users == null or users.isEmpty()}">
            暂无用户
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-inner">
        <span class="copyright">
            &copy; <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> 学习研究. All rights reserved.
        </span>
        <div class="footer-powered">
            <span class="dot"></span>
            Powered by Spring Boot
        </div>
    </div>
</footer>

</body>
</html>
