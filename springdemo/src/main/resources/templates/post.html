<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${post.title}">Blog Post</title>
    <meta name="description" th:content="${post.description != null ? post.description : post.title}" />
    <meta name="author" th:content="${profile.username != null ? profile.username : userName}" />
    <link rel="stylesheet" th:href="@{/css/index.css}" />
    <!-- <link rel="stylesheet" href="/getFile/highlight.min.css"> -->
    <link rel="stylesheet" href="/getFile/quill.snow.css">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <style>
      #myEditor {
        border: none  !important;
      }
      .ql-editor {
        padding: 0;
      }
    </style>
    <!-- <script src="/getFile/highlight.min.js"></script> -->
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <a
          class="logo"
          th:href="@{/blog/{userName}(userName=${userName})}"
          th:text="${userName}"
          >Blog</a
        >
        <nav class="nav-links">
          <a
            class="nav-link"
            th:href="@{/blog/{userName}(userName=${userName})}"
            >首页</a
          >
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">
      <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar">
          <!-- Profile Card -->
          <section class="profile" th:if="${profile != null}">
            <div class="profile-card">
              <a th:href="@{/blog/{userName}(userName=${userName})}">
                <div class="profile-avatar" th:if="${profile.avatar != null}">
                  <img th:src="${profile.avatar}" alt="avatar" />
                </div>
              </a>
              <div
                class="profile-avatar"
                th:unless="${profile.avatar != null}"
              ></div>
              <div class="profile-info">
                <a th:href="@{/blog/{userName}(userName=${userName})}">
                  <h2
                    th:text="${profile.username != null ? profile.username : userName}"
                  >
                    用户名
                  </h2>
                </a>

                <p
                  class="profile-bio"
                  th:if="${profile.bio != null}"
                  th:text="${profile.bio}"
                >
                  个人简介
                </p>
                <div class="profile-extra">
                  <span class="profile-email" th:if="${profile.email != null}">
                    <svg
                      class="icon"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                      />
                      <polyline points="22,6 12,13 2,6" />
                    </svg>
                    <span th:text="${profile.email}">email@example.com</span>
                  </span>
                  <a
                    class="profile-social"
                    th:if="${profile.github != null}"
                    th:href="${profile.github}"
                    target="_blank"
                    rel="noopener noreferrer"
                    title="GitHub"
                  >
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                      <path
                        d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
                      />
                    </svg>
                  </a>
                  <a
                    class="profile-social"
                    th:if="${profile.website != null}"
                    th:href="${profile.website}"
                    target="_blank"
                    rel="noopener noreferrer"
                    title="Website"
                  >
                    <svg
                      class="icon"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <circle cx="12" cy="12" r="10" />
                      <line x1="2" y1="12" x2="22" y2="12" />
                      <path
                        d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"
                      />
                    </svg>
                  </a>
                </div>
              </div>
            </div>
          </section>
        </aside>

        <!-- Content Area -->
        <div class="content-area">
          <!-- Post Detail -->
          <article class="post-detail">
            <header class="detail-header">
              <h1 class="detail-title" th:text="${post.title}">文章标题</h1>
              <div class="detail-meta">
                <span
                  class="detail-category"
                  th:if="${post.categoryName != null}"
                  th:text="${post.categoryName}"
                  >分类</span
                >
                <span
                  class="detail-views"
                  th:text="${post.viewCount} + ' views'"
                  >0 views</span
                >
                <span
                  th:if="${post.updatedAt != null}"
                  th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd')}"
                  >2025-01-01</span
                >
              </div>
            </header>
            <div id="myEditor" class="detail-content  ql-snow" th:utext="${post.contentHtml}">
              文章内容
            </div>
          </article>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-inner">
        <span class="copyright">
          &copy;
          <span th:text="${#temporals.year(#temporals.createNow())}">2025</span>
          <span th:text="${userName}">Blog</span>. All rights reserved.
        </span>
        <ul class="footer-links">
          <li>
            <a th:href="@{/blog/{userName}(userName=${userName})}"
              >首页</a
            >
          </li>
        </ul>
        <div class="footer-powered">
          <span class="dot"></span>
          Powered by Spring Boot
        </div>
      </div>
    </footer>
  </body>
  <script th:inline="javascript">



  const quill = new Quill('#myEditor', {
    theme: 'snow',
            readOnly: true,
        modules: {
            toolbar: false
        }

  });


</script>

</html>
