# spring.application.name=springdemo
# spring.application.name=springdemo
spring:
  # application: springdemo
  datasource:
    url: jdbc:mysql://${HOST:localhost}:3306/website
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PS:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 500MB # 单个文件最大
      max-request-size: 500MB # 整个请求最大（多个文件）
  data:
    redis:
      host: ${HOST:localhost}
      port: 6379
      # password: "${REDIS_PS:password}"
  # rabbitmq:
  #   host: ${HOST:localhost}
  #   port: 5672
  #   username: ${MQ:root}
  #   password: ${PS_COMMON:password}
  mvc:
    log-request-details: true
  session:
    timeout: 7200

  # servlet:
  # session:
  #   cookie:
  #     same-site: none
mybatis:
  mapper-locations:
    - classpath:mapper/**/*.xml
  type-aliases-package: com.example.springdemo.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    # 将DispatcherServlet的日志级别设为DEBUG
    "[org.springframework.web.servlet.DispatcherServlet]": DEBUG
  file:
    name: logs/springdemo.log
  logback:
    rollingpolicy:
      max-file-size: 100MB # 单个文件最大大小
      max-history: 3 # 保留天数
      total-size-cap: 1GB # 总大小上限
      clean-history-on-start: false # 启动时是否清理历史日志
pagehelper:
  helper-dialect: mysql # 指定数据库类型
  reasonable: true # 分页合理化，当pageNum<1时默认查第一页
  support-methods-arguments: true # 支持通过Mapper接口参数传递分页参数

# ── 站点配置 ──────────────────────────────────────────
app:
  site-url: ${SITE_URL:http://localhost:8080} # 站点根地址，用于 sitemap.xml
